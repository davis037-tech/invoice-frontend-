<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Invoices — Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <div class="topbar" id="topbar"></div>

    <div class="list-head">
      <h1 style="font-size:22px;">Invoices</h1>
      <a class="btn" href="invoice-new.html">+ New invoice</a>
    </div>

    <div style="margin-bottom:16px; display:flex; gap:8px; flex-wrap:wrap;" id="status-filters">
      <button class="btn btn-ghost" data-status="">All</button>
      <button class="btn btn-ghost" data-status="DRAFT">Draft</button>
      <button class="btn btn-ghost" data-status="SENT">Sent</button>
      <button class="btn btn-ghost" data-status="PAID">Paid</button>
      <button class="btn btn-ghost" data-status="OVERDUE">Overdue</button>
    </div>

    <input type="text" id="search-input" placeholder="Search by client or invoice number…" style="margin-bottom:16px;" />

    <div id="error-box"></div>

    <div class="card" id="invoices-list">
      <p class="muted">Loading…</p>
    </div>
  </div>

<script src="api.js"></script>
<script src="nav.js"></script>
<script>
Auth.requireLogin();
renderTopbar("invoices");

const listEl = document.getElementById("invoices-list");
const errorBox = document.getElementById("error-box");
const searchInput = document.getElementById("search-input");
let currentStatus = "";
let allInvoices = [];

document.querySelectorAll("#status-filters [data-status]").forEach(btn => {
  btn.addEventListener("click", () => {
    currentStatus = btn.dataset.status;
    document.querySelectorAll("#status-filters .btn").forEach(b => b.style.borderColor = "");
    btn.style.borderColor = "var(--ink)";
    loadInvoices();
  });
});

searchInput.addEventListener("input", () => renderInvoices(filterBySearch(allInvoices)));

function filterBySearch(invoices) {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) return invoices;
  return invoices.filter(inv =>
    inv.client_name.toLowerCase().includes(q) ||
    inv.number.toLowerCase().includes(q)
  );
}

async function loadInvoices() {
  try {
    const qs = currentStatus ? `?status=${currentStatus}` : "";
    const data = await apiFetch(`/invoices/${qs}`);
    allInvoices = data.data;
    renderInvoices(filterBySearch(allInvoices));
  } catch (err) {
    showError(errorBox, err.message);
  }
}

function initials(name) {
  return name.trim().split(/\s+/).slice(0, 2).map(w => w[0]).join("").toUpperCase();
}

function renderInvoices(invoices) {
  if (!invoices.length) {
    listEl.innerHTML = `
      <div class="empty-state">
        <h3>No invoices here</h3>
        <p>Create an invoice to start getting paid.</p>
      </div>`;
    return;
  }
  listEl.innerHTML = invoices.map(inv => {
    const isEmptyDraft = inv.status === "DRAFT" && Number(inv.total) === 0;
    return `
    <a class="list-row" href="invoice-detail.html?id=${inv.id}" style="display:flex; align-items:center; text-decoration:none; gap:12px;">
      <div style="width:34px; height:34px; border-radius:50%; background:var(--paper-line); display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:12px; color:var(--slate); flex-shrink:0;">
        ${initials(inv.client_name)}
      </div>
      <div style="flex:1; min-width:0;">
        <div class="primary mono">${escapeHtml(inv.number)}</div>
        <div class="secondary">${escapeHtml(inv.client_name)} · created ${formatDate(inv.created_at)} · due ${formatDate(inv.due_date)}</div>
      </div>
      <div style="display:flex; align-items:center; gap:14px; flex-shrink:0;">
        <span class="status-pill ${inv.status}">${inv.status}</span>
        ${isEmptyDraft
          ? `<span class="muted" style="font-size:12px;">Add items to calculate total</span>`
          : `<span class="amount">${formatMoney(inv.total, inv.currency)}</span>`}
      </div>
    </a>
  `;
  }).join("");
}

loadInvoices();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Invoice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #B08D57;
    --gold-bright: #C9A876;
    --ink: #241F19;
    --muted: #8A8175;
    --line: #E7E1D6;
    --panel: #F6F1E7;
    --paper: #FFFFFF;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #F0ECE3;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .doc {
    max-width: 640px;
    margin: 0 auto;
    background: var(--paper);
    min-height: 100vh;
  }
  .gold-bar { height: 8px; background: var(--gold); }
  .pad { padding: 32px 28px; }

  .label {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
  }

  .inv-header {
    display: flex;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }
  .inv-header h1 {
    font-family: 'Source Serif 4', serif;
    font-size: 34px;
    letter-spacing: 0.02em;
    color: var(--gold);
    margin: 0 0 18px;
  }
  .meta-row { margin-bottom: 10px; }
  .meta-row .label { display: block; margin-bottom: 2px; }
  .meta-row .value { font-size: 14px; font-weight: 500; }

  .parties { display: flex; flex-direction: column; gap: 18px; text-align: right; }
  .party-block .label { margin-bottom: 6px; }
  .party-name { font-weight: 600; font-size: 14px; }
  .party-detail { font-size: 13px; color: var(--muted); line-height: 1.5; }

  table.items {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
    font-size: 13px;
  }
  table.items thead th {
    text-align: left;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    padding-bottom: 10px;
    border-bottom: 1.5px solid var(--gold);
  }
  table.items th.num, table.items td.num { text-align: right; }
  table.items tbody td {
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
  }
  table.items tbody tr:last-child td { border-bottom: none; }

  .totals { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; margin-bottom: 28px; }
  .totals .row { display: flex; gap: 24px; font-size: 13px; color: var(--muted); }
  .totals .row .t-label { letter-spacing: 0.04em; text-transform: uppercase; font-size: 11px; }
  .totals .row .t-value { min-width: 90px; text-align: right; color: var(--ink); }

  .highlight-bar {
    display: flex;
    justify-content: space-between;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 18px 22px;
    margin-bottom: 8px;
  }
  .highlight-bar .big { font-family: 'Source Serif 4', serif; font-size: 20px; font-weight: 700; margin-top: 4px; }
  .highlight-bar .gold { color: var(--gold); }

  .footer-band { background: var(--panel); padding: 28px; }
  .footer-band p { margin: 0 0 20px; font-size: 14px; }
  .footer-cols { display: flex; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
  .footer-cols .label { margin-bottom: 4px; }
  .footer-cols .value { font-size: 13px; }

  .step-nav { text-align: center; margin: 20px 0; }
  .btn-gold {
    display: inline-block;
    background: var(--gold);
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 13px 30px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    text-decoration: none;
  }
  .btn-gold:hover { background: var(--gold-bright); }
  .btn-outline {
    display: inline-block;
    background: none;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 12px 20px;
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
    text-decoration: none;
  }

  .pay-card { background: var(--paper); border: 1px solid var(--line); border-radius: 6px; padding: 24px; margin-bottom: 16px; }
  .pay-card .label { margin-bottom: 10px; }
  .pay-card textarea, .pay-card input[type=file] {
    width: 100%;
    font-family: inherit;
    font-size: 14px;
    padding: 10px;
    border: 1px solid var(--line);
    border-radius: 4px;
    margin-top: 4px;
    background: #fff;
    color: var(--ink);
  }
  .field { margin-bottom: 14px; }
  .field label { font-size: 12px; color: var(--muted); }

  .error-banner { background: #FBEAEA; border: 1px solid #E3B8B8; color: #8A2E2E; padding: 12px 14px; border-radius: 4px; font-size: 13px; margin: 16px 28px 0; }
  .status-tag {
    display: inline-block; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 3px; font-weight: 600;
  }
  .status-tag.PAID { background: #E4EFE1; color: #4C7A3F; }
  .status-tag.OVERDUE { background: #FBEAEA; color: #8A2E2E; }
  .status-tag.CANCELLED { background: #EEEBE5; color: var(--muted); }
</style>
</head>
<body>
  <div class="doc">
    <div class="gold-bar"></div>
    <div id="error-box"></div>
    <div id="invoice-container">
      <div class="pad"><p class="muted">Loading…</p></div>
    </div>
  </div>

<script src="api.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const token = params.get("token");
const container = document.getElementById("invoice-container");
const errorBox = document.getElementById("error-box");

async function loadInvoice() {
  try {
    const data = await apiFetch(`/public/invoices/${token}`, { skipAuth: true });
    render(data.data);
  } catch (err) {
    showError(errorBox, err.message);
  }
}

function render(inv) {
  const supplier = inv.supplier || {};
  const itemsRows = inv.items.map(item => `
    <tr>
      <td>${escapeHtml(item.description)}</td>
      <td class="num">${item.quantity}</td>
      <td class="num">${formatMoney(item.unit_price, inv.currency)}</td>
      <td class="num">${formatMoney(item.quantity * item.unit_price, inv.currency)}</td>
    </tr>
  `).join("");

  const showBankDetails = (inv.status === "SENT" || inv.status === "OVERDUE") && inv.bank_transfer_details;

  container.innerHTML = `
    <div id="step-invoice">
      <div class="pad">
        <div class="inv-header">
          <div>
            <h1>Invoice</h1>
            <div class="meta-row"><span class="label">Invoice</span><span class="value">${escapeHtml(inv.number)}</span></div>
            <div class="meta-row"><span class="label">Issue date</span><span class="value">${formatDate(inv.issue_date)}</span></div>
            <div class="meta-row"><span class="label">Due date</span><span class="value">${formatDate(inv.due_date)}</span></div>
            ${inv.status !== "SENT" ? `<span class="status-tag ${inv.status}" style="margin-top:6px;">${inv.status}</span>` : ""}
          </div>
          <div class="parties">
            <div class="party-block">
              <div class="label">Supplier</div>
              <div class="party-name">${escapeHtml(supplier.business_name || "")}</div>
              ${supplier.business_address ? `<div class="party-detail">${escapeHtml(supplier.business_address)}</div>` : ""}
            </div>
            <div class="party-block">
              <div class="label">Client</div>
              <div class="party-name">${escapeHtml(inv.client_name)}</div>
              <div class="party-detail">${escapeHtml(inv.client_email)}</div>
              ${inv.client_address ? `<div class="party-detail">${escapeHtml(inv.client_address)}</div>` : ""}
            </div>
          </div>
        </div>

        <table class="items">
          <thead>
            <tr><th>Description</th><th class="num">Qty</th><th class="num">Unit price</th><th class="num">Total</th></tr>
          </thead>
          <tbody>${itemsRows}</tbody>
        </table>

        <div class="totals">
          <div class="row"><span class="t-label">Subtotal</span><span class="t-value">${formatMoney(inv.subtotal, inv.currency)}</span></div>
          <div class="row"><span class="t-label">Tax (${(inv.tax_rate * 100).toFixed(2)}%)</span><span class="t-value">${formatMoney(inv.tax_amount, inv.currency)}</span></div>
          <div class="row"><span class="t-label" style="color:var(--ink); font-weight:600;">Total</span><span class="t-value" style="font-weight:700;">${formatMoney(inv.total, inv.currency)}</span></div>
        </div>

        <div class="highlight-bar">
          <div>
            <span class="label">Due date</span>
            <div class="big">${formatDate(inv.due_date)}</div>
          </div>
          <div style="text-align:right;">
            <span class="label">Amount due</span>
            <div class="big gold">${inv.status === "PAID" ? "Paid" : formatMoney(inv.total, inv.currency)}</div>
          </div>
        </div>

        ${inv.notes ? `<div style="margin-top:24px; padding-top:16px; border-top:1px solid var(--line);"><div class="label" style="margin-bottom:6px;">Notes</div><p style="font-size:13px; color:var(--muted);">${escapeHtml(inv.notes)}</p></div>` : ""}
      </div>

      ${showBankDetails ? `
        <div class="step-nav">
          <button class="btn-gold" id="continue-btn">Continue to payment →</button>
          ${inv.payment_proof_submitted_at ? `<p style="font-size:12px; color:var(--muted); margin-top:12px;">Payment confirmation submitted ${formatDate(inv.payment_proof_submitted_at)} — awaiting review.</p>` : ""}
        </div>
      ` : ""}
    </div>

    ${showBankDetails ? `
    <div id="step-payment" style="display:none;">
      <div class="pad" style="padding-top:8px;">
        <a href="#" id="back-btn" class="btn-outline" style="margin-bottom:20px;">← Back to invoice</a>

        <div class="pay-card">
          <div class="label">Pay by bank transfer</div>
          <p style="white-space:pre-line; font-size:14px; margin:0;">${escapeHtml(inv.bank_transfer_details)}</p>
        </div>

        <div class="pay-card">
          <div class="label">Already paid?</div>
          ${inv.payment_proof_submitted_at ? `
            <p style="font-size:13px; color:var(--muted);">
              You submitted payment confirmation on ${formatDate(inv.payment_proof_submitted_at)}.
              We'll confirm receipt shortly. Sent the wrong details? You can submit again below.
            </p>
          ` : `
            <p style="font-size:13px; color:var(--muted);">
              Once you've made the transfer, let us know so we can confirm it —
              add your transaction reference and/or a photo of the receipt.
            </p>
          `}
          <div id="proof-error"></div>
          <form id="proof-form">
            <div class="field">
              <label for="proof-note">Transaction reference / note</label>
              <textarea id="proof-note" name="note" rows="3" placeholder="e.g. Bank ref #123456, transferred 11 Jul"></textarea>
            </div>
            <div class="field">
              <label for="proof-image">Receipt photo (optional)</label>
              <input id="proof-image" name="image" type="file" accept="image/*" />
            </div>
            <button class="btn-gold" type="submit" id="proof-submit-btn" style="border:none; width:100%;">Submit payment confirmation</button>
          </form>
        </div>
      </div>
    </div>
    ` : ""}

    <div class="footer-band">
      <p>Thank you for your business.</p>
      <div class="footer-cols">
        ${supplier.business_name ? `<div><div class="label">From</div><div class="value">${escapeHtml(supplier.business_name)}</div></div>` : ""}
        <div><div class="label">Invoice</div><div class="value">${escapeHtml(inv.number)}</div></div>
      </div>
    </div>
  `;

  if (showBankDetails) {
    const stepInvoice = document.getElementById("step-invoice");
    const stepPayment = document.getElementById("step-payment");
    document.getElementById("continue-btn").addEventListener("click", () => {
      stepInvoice.style.display = "none";
      stepPayment.style.display = "block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
    document.getElementById("back-btn").addEventListener("click", (e) => {
      e.preventDefault();
      stepPayment.style.display = "none";
      stepInvoice.style.display = "block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  }

  const proofForm = document.getElementById("proof-form");
  if (proofForm) {
    proofForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const proofErrorBox = document.getElementById("proof-error");
      const submitBtn = document.getElementById("proof-submit-btn");
      proofErrorBox.innerHTML = "";

      const note = proofForm.note.value.trim();
      const file = proofForm.image.files[0];

      if (!note && !file) {
        showError(proofErrorBox, "Add a reference note or a receipt photo.");
        return;
      }
      if (file && file.size > 3 * 1024 * 1024) {
        showError(proofErrorBox, "That photo is too large — please use one under 3MB.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting…";

      try {
        const image_base64 = file ? await fileToDataUrl(file) : null;
        await apiFetch(`/public/invoices/${token}/payment-proof`, {
          method: "POST",
          skipAuth: true,
          body: { note: note || null, image_base64 },
        });
        loadInvoice();
      } catch (err) {
        showError(proofErrorBox, err.message);
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit payment confirmation";
      }
    });
  }
}

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

loadInvoice();
</script>
</body>
</html>

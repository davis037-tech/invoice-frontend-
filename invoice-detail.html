<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Invoice — Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <div class="topbar" id="topbar"></div>

    <div class="list-head">
      <a class="text-link" href="invoices.html">← Back to invoices</a>
      <div id="actions" style="display:flex; gap:8px;"></div>
    </div>

    <div id="error-box"></div>
    <div id="invoice-container">
      <p class="muted">Loading…</p>
    </div>
  </div>

<script src="api.js"></script>
<script src="nav.js"></script>
<script>
Auth.requireLogin();
renderTopbar("invoices");

const params = new URLSearchParams(window.location.search);
const invoiceId = params.get("id");
const container = document.getElementById("invoice-container");
const errorBox = document.getElementById("error-box");
const actionsEl = document.getElementById("actions");

async function loadInvoice() {
  try {
    const data = await apiFetch(`/invoices/${invoiceId}`);
    render(data.data);
  } catch (err) {
    showError(errorBox, err.message);
  }
}

function render(inv) {
  const publicUrl = `${window.location.origin}/public-invoice.html?token=${inv.public_token}`;

  actionsEl.innerHTML = `
    ${inv.status === "DRAFT" ? `<button class="btn" id="send-btn">Generate invoice link</button>` : ""}
    ${inv.status === "SENT" || inv.status === "OVERDUE" ? `<button class="btn" id="mark-paid-btn">Mark as paid</button>` : ""}
    ${inv.status !== "DRAFT" ? `<a class="btn btn-ghost" href="public-invoice.html?token=${inv.public_token}" target="_blank">Open link</a>` : ""}
  `;

  if (inv.status !== "DRAFT") {
    actionsEl.innerHTML += `
      <div style="display:flex; gap:8px; align-items:center; margin-top:12px; width:100%;">
        <input type="text" readonly value="${publicUrl}" id="public-link-input" style="flex:1;" />
        <button class="btn btn-ghost" id="copy-link-btn" style="flex-shrink:0;">Copy link</button>
      </div>
    `;
    const copyBtn = document.getElementById("copy-link-btn");
    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(publicUrl);
        copyBtn.textContent = "Copied!";
        setTimeout(() => { copyBtn.textContent = "Copy link"; }, 1500);
      } catch {
        document.getElementById("public-link-input").select();
        document.execCommand("copy");
        copyBtn.textContent = "Copied!";
        setTimeout(() => { copyBtn.textContent = "Copy link"; }, 1500);
      }
    });
  }

  const itemsRows = inv.items.map(item => `
    <tr>
      <td>${escapeHtml(item.description)}</td>
      <td class="num">${item.quantity}</td>
      <td class="num">${formatMoney(item.unit_price, inv.currency)}</td>
      <td class="num">${formatMoney(item.quantity * item.unit_price, inv.currency)}</td>
    </tr>
  `).join("");

  container.innerHTML = `
    <div class="invoice-doc">
      ${inv.status !== "DRAFT" && inv.status !== "OVERDUE" ? `<div class="stamp ${inv.status}">${inv.status}</div>` : ""}
      ${inv.status === "OVERDUE" ? `<div class="stamp OVERDUE">OVERDUE</div>` : ""}

      <div class="invoice-head">
        <div>
          <div class="eyebrow">Invoice</div>
          <h1 style="font-size:26px;">${escapeHtml(inv.client_name)}</h1>
          <div class="muted">${escapeHtml(inv.client_email)}</div>
          ${inv.client_address ? `<div class="muted">${escapeHtml(inv.client_address)}</div>` : ""}
        </div>
        <div style="text-align:right;">
          <div class="num">${escapeHtml(inv.number)}</div>
          <div class="muted" style="font-size:13px; margin-top:6px;">Issued ${formatDate(inv.issue_date)}</div>
          <div class="muted" style="font-size:13px;">Due ${formatDate(inv.due_date)}</div>
        </div>
      </div>

      <table class="line-items">
        <thead>
          <tr>
            <th>Description</th>
            <th class="num">Qty</th>
            <th class="num">Unit price</th>
            <th class="num">Amount</th>
          </tr>
        </thead>
        <tbody>${itemsRows}</tbody>
      </table>

      <div class="totals">
        <div class="row"><span>Subtotal</span><span>${formatMoney(inv.subtotal, inv.currency)}</span></div>
        <div class="row"><span>Tax (${(inv.tax_rate * 100).toFixed(2)}%)</span><span>${formatMoney(inv.tax_amount, inv.currency)}</span></div>
        <div class="row grand"><span>Total due</span><span>${formatMoney(inv.total, inv.currency)}</span></div>
      </div>

      ${inv.notes ? `<div style="margin-top:28px; padding-top:16px; border-top:1px solid var(--paper-line);"><div class="eyebrow" style="margin-bottom:6px;">Notes</div><p class="muted">${escapeHtml(inv.notes)}</p></div>` : ""}
    </div>

    ${inv.payment_proof_submitted_at ? `
      <div class="card" style="margin-top:20px;">
        <div class="eyebrow" style="margin-bottom:10px;">Payment confirmation submitted</div>
        <p class="muted" style="font-size:13px; margin-top:-4px;">Submitted ${formatDate(inv.payment_proof_submitted_at)}</p>
        ${inv.payment_proof_note ? `<p style="white-space:pre-line;">${escapeHtml(inv.payment_proof_note)}</p>` : ""}
        ${inv.payment_proof_image ? `<img src="${inv.payment_proof_image}" alt="Receipt" style="max-width:100%; border:1px solid var(--paper-line); border-radius:4px; margin-top:8px;" />` : ""}
        ${inv.status !== "PAID" ? `
          <div style="display:flex; gap:8px; margin-top:16px;">
            <button class="btn btn-stamp" id="confirm-proof-btn">Confirm &amp; mark paid</button>
            <button class="btn btn-ghost" id="reject-proof-btn">Reject, ask to resubmit</button>
          </div>
        ` : ""}
      </div>
    ` : ""}
  `;

  const sendBtn = document.getElementById("send-btn");
  if (sendBtn) {
    sendBtn.addEventListener("click", async () => {
      sendBtn.disabled = true;
      sendBtn.textContent = "Generating…";
      try {
        await apiFetch(`/invoices/${invoiceId}/send`, { method: "POST" });
        loadInvoice();
      } catch (err) {
        showError(errorBox, err.message);
        sendBtn.disabled = false;
        sendBtn.textContent = "Generate invoice link";
      }
    });
  }

  const markPaidBtn = document.getElementById("mark-paid-btn");
  if (markPaidBtn) {
    markPaidBtn.addEventListener("click", async () => {
      markPaidBtn.disabled = true;
      markPaidBtn.textContent = "Marking…";
      try {
        await apiFetch(`/billing/invoices/${invoiceId}/mark-paid`, { method: "POST" });
        loadInvoice();
      } catch (err) {
        showError(errorBox, err.message);
        markPaidBtn.disabled = false;
        markPaidBtn.textContent = "Mark as paid";
      }
    });
  }

  const confirmProofBtn = document.getElementById("confirm-proof-btn");
  if (confirmProofBtn) {
    confirmProofBtn.addEventListener("click", async () => {
      confirmProofBtn.disabled = true;
      try {
        await apiFetch(`/billing/invoices/${invoiceId}/mark-paid`, { method: "POST" });
        loadInvoice();
      } catch (err) {
        showError(errorBox, err.message);
        confirmProofBtn.disabled = false;
      }
    });
  }

  const rejectProofBtn = document.getElementById("reject-proof-btn");
  if (rejectProofBtn) {
    rejectProofBtn.addEventListener("click", async () => {
      if (!confirm("Reject this payment confirmation? The client will need to submit it again.")) return;
      rejectProofBtn.disabled = true;
      try {
        await apiFetch(`/billing/invoices/${invoiceId}/reject-proof`, { method: "POST" });
        loadInvoice();
      } catch (err) {
        showError(errorBox, err.message);
        rejectProofBtn.disabled = false;
      }
    });
  }
}

loadInvoice();
</script>
</body>
</html>
